name: Build and Publish to GHCR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # >>> НОВЫЙ ШАГ: Отправка вебхука в Argo CD Image Updater <<<
      - name: Trigger Argo CD Image Updater webhook
        run: |
          # Формируем payload, который ожидает Argo CD Image Updater.
          # Он ожидает событие типа 'push' от GitHub.
          # Создаём временный JSON файл с необходимыми полями.
          cat <<EOF > payload.json
          {
            "ref": "refs/heads/main",
            "repository": {
              "clone_url": "https://github.com/${{ github.repository }}"
            },
            "head_commit": {
              "id": "${{ github.sha }}",
              "message": "${{ github.event.head_commit.message }}"
            }
          }
          EOF

          # Вычисляем подпись (signature) для вебхука, используя HMAC-SHA256
          # с нашим секретом. Это обязательный шаг для безопасности[citation:6][citation:8].
          SIGNATURE=$(cat payload.json | openssl dgst -sha256 -hmac "${{ secrets.GHCR_WEBHOOK_SECRET }}" | sed 's/^.* //')

          # Отправляем POST-запрос к вебхуку вашего Image Updater'а.
          # Замените <URL_ВАШЕГО_IMAGE_UPDATER> на реальный URL, по которому он доступен из интернета.
          # Обычно это что-то вроде https://argocd-image-updater.ваш-домен.com/webhook
          curl -X POST https://188.119.65.57:32138/webhook \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -H "Content-Type: application/json" \
            -d @payload.json