apiVersion: apps/v1
kind: Deployment
metadata:
  name: questions-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: questions-db
  template:
    metadata:
      labels:
        app: questions-db
    spec:
      containers:
        - name: db
          image: postgres:17-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: questions-db-secret
                  key: db_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questions-db-secret
                  key: db_pass
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: questions-config
                  key: db_name
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: questions-db-service
spec:
  selector:
    app: questions-db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
