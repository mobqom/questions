apiVersion: v1
kind: Service
metadata:
  name: questions-db
spec:
  type: ClusterIP
  selector:
    app: questions-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: questions-db
spec:
  selector:
    matchLabels:
      app: questions-db
  template:
    metadata:
      labels:
        app: questions-db
    spec:
      containers:
        - name: db
          image: postgres:17-alpine
          env:
            - name: POSTGRES_USER
              value: "user"
            - name: POSTGRES_PASSWORD
              value: "password"
            - name: POSTGRES_DB
              value: "questions"
          ports:
            - containerPort: 5432
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "user", "-d", "questions"]
            initialDelaySeconds: 10
            periodSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "user", "-d", "questions"]
            initialDelaySeconds: 5
            periodSeconds: 5
