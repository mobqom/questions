apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: questions-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mobqom/questions.git
    targetRevision: HEAD
    path: k8s/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: questions-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mobqom/questions.git
    targetRevision: HEAD
    path: k8s/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
