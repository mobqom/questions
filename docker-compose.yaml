services:
  db:
    image: postgres:17-alpine
    container_name: questions-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: questions
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d questions"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: questions-backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: user
      DB_PASS: password
      DB_NAME: questions
    restart: always

volumes:
  postgres_data:
