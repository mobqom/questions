apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: questions-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mobqom/questions.git
    targetRevision: main
    path: k8s/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: apps-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
