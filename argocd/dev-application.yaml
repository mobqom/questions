apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: questions-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:mobqom/questions.git
    targetRevision: dev
    path: k8s/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: apps-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
