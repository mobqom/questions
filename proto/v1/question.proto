syntax = "proto3";

package question.v1;

option go_package = "github.com/mobqom/questions/proto/v1/question;questionv1";

service QuestionService {
  rpc FindAll(FindAllRequest) returns (FindAllResponse);
  rpc AddQuestion(AddQuestionRequest) returns (AddQuestionResponse);
  rpc FindRandomQuestion(FindRandomQuestionRequest) returns (FindRandomQuestionResponse);
  rpc FindByGameId(FindByGameIdRequest) returns (FindByGameIdResponse);
}

message Question {
  uint32 id = 1;
  string content = 2;
  string game = 3;
}

message FindAllRequest {}
message FindAllResponse {
  repeated Question questions = 1;
}

message AddQuestionRequest {
  string content = 1;
  string game = 2;
}
message AddQuestionResponse {
  Question question = 1;
}

message FindRandomQuestionRequest {
  string game_id = 1;
}
message FindRandomQuestionResponse {
  Question question = 1;
}

message FindByGameIdRequest {
  string game_id = 1;
}
message FindByGameIdResponse {
  repeated Question questions = 1;
}
