syntax = "proto3";

package options.v1;

option go_package = "github.com/mobqom/questions/proto/v1/option;optionsv1";

service OptionsService {
  rpc AddOption(AddOptionRequest) returns (AddOptionResponse);
  rpc FindOptionsByQuestionId(FindOptionsByQuestionIdRequest) returns (FindOptionsByQuestionIdResponse);
}

message Option {
  uint32 id = 1;
  string content = 2;
  uint32 question_id = 3;
}

message AddOptionRequest {
  string content = 1;
  uint32 question_id = 2;
}
message AddOptionResponse {
  Option option = 1;
}

message FindOptionsByQuestionIdRequest {
  uint32 question_id = 1;
}
message FindOptionsByQuestionIdResponse {
  repeated Option options = 1;
}
